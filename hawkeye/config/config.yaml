device: cuda

camera:
  input_mode: video_file
  video_file_path: data/raw/videos/recording.mp4
  fps: 30

yolo:
  model_path: models/yolo/finetuned/best.pt
  confidence_threshold: 0.28   # lower — catch small/borderline FODs
  iou_threshold: 0.45
  input_size: 640

tracker:
  confirm_frames: 2      # 2 consecutive frames to confirm — more sensitive
  iou_threshold: 0.20    # lower — easier matching for small boxes across frames
  max_miss_frames: 3     # more forgiving — track survives a missed frame

pipeline:
  top_crop: 0.50         # was 0.60 — include more frame for distant/small FODs
  bot_crop: 0.05

outputs:
  detections_path: outputs/detections
  alerts_path: outputs/alerts

logging:
  log_path: logs/hawkeye.log
  level: INFO
