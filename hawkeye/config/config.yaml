device: cuda

camera:
  input_mode: video_file
  video_file_path: data/raw/videos/recording.mp4
  fps: 30

yolo:
  model_path: models/yolo/finetuned/best.pt
  confidence_threshold: 0.35
  iou_threshold: 0.45
  input_size: 640

tracker:
  confirm_frames: 4      # consecutive frames to confirm FOD (filters transient false flags)
  iou_threshold: 0.35    # IoU to match detection to existing track
  max_miss_frames: 2     # frames a track can miss before being dropped

pipeline:
  top_crop: 0.60         # cut top 60% — distant runway with shadows/gradients
  bot_crop: 0.05         # small trim for vehicle edge

outputs:
  detections_path: outputs/detections
  alerts_path: outputs/alerts

logging:
  log_path: logs/hawkeye.log
  level: INFO
