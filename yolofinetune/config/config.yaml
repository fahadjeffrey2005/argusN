device: cuda

camera:
  input_mode: video_file
  video_file_path: data/raw/videos/recording.mp4
  resolution:
    width: 1920
    height: 1080
  fps: 60

yolo:
  model_path: models/yolo/finetuned/best.pt
  pretrained_path: models/yolo/yolov8n.pt
  confidence_threshold: 0.35
  iou_threshold: 0.45
  input_size: 640
  classes: 1
  class_names: ["fod"]
  freeze_layers: 10
  epochs: 50
  batch_size: 16
  learning_rate: 0.001

pipeline:
  top_crop: 0.22
  bot_crop: 0.15
  warmup_frames: 30

outputs:
  detections_path: outputs/detections
  alerts_path: outputs/alerts

logging:
  log_path: logs/yolofinetune.log
  level: INFO
