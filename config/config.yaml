# ============================================================
# ARGUS-N — Master Configuration
# ============================================================

# ------------------------------------------------------------
# DEVICE
# mps = Mac M4 | cuda = NVIDIA GPU | cpu = fallback
# ------------------------------------------------------------
device: cuda

# ------------------------------------------------------------
# CAMERA
# ------------------------------------------------------------
camera:
  count: 3                         # PoC: 2x RGB + 1x NIR
  resolution:
    width: 1920
    height: 1080
  fps: 60
  shutter: global
  input_mode: simulated            # usb | video_file | simulated
  video_file_path: null            # set path when testing with video
  simulate_nir: true               # true = NIR simulated from RGB_0
  nir_video_path: null             # set path for real NIR camera video

# ------------------------------------------------------------
# IMU
# ------------------------------------------------------------
imu:
  enabled: true
  update_rate_hz: 200
  port: /dev/ttyUSB0
  drift_correction: true
  drift_correction_interval: 1     # every N sweeps

# ------------------------------------------------------------
# GPS
# ------------------------------------------------------------
gps:
  enabled: true
  port: /dev/ttyUSB1
  runway_threshold_coords:
    lat: 0.0
    lon: 0.0

# ------------------------------------------------------------
# RAFT — Optical Flow
# ------------------------------------------------------------
raft:
  model_size: small
  model_path: models/raft/raft_small.pth
  iterations: 12
  input_size:
    width: 1920
    height: 1080
  egomotion_subtraction: true

# ------------------------------------------------------------
# EXCLUSION MASK — Runway Lights
# ------------------------------------------------------------
exclusion_mask:
  enabled: true
  mask_path: config/runway_mask.png
  strobe_frequency_filter: true
  strobe_hz_range: [0.5, 2.0]

# ------------------------------------------------------------
# YOLO — Object Detection
# ------------------------------------------------------------
yolo:
  model_path: models/yolo_runs/fod_v3/weights/best.engine
  confidence_threshold: 0.35
  iou_threshold: 0.45
  input_size: 640
  run_on_patches_only: true
  patch_padding: 20

# ------------------------------------------------------------
# BYTETRACK — Tracking
# ------------------------------------------------------------
# ------------------------------------------------------------
# FUSION
# ------------------------------------------------------------
fusion:
  nir_gate_enabled: true
  nir_contrast_threshold: 18.0    # lower = more sensitive, higher = stricter

# ------------------------------------------------------------
# BYTETRACK — Tracking
# ------------------------------------------------------------
bytetrack:
  track_thresh: 0.5
  match_thresh: 0.8
  track_buffer: 30
  confirmation_frames_base: 6
  dynamic_window: true
  min_speed_kmh: 5
  max_speed_kmh: 30

# ------------------------------------------------------------
# FLOW RESIDUAL
# ------------------------------------------------------------
flow:
  residual_threshold: 2.5
  min_anomaly_area_px: 10
  max_anomaly_area_px: 50000

# ------------------------------------------------------------
# GIMBAL
# ------------------------------------------------------------
gimbal:
  enabled: true
  stabilisation: true

# ------------------------------------------------------------
# LEARNING LOOP
# ------------------------------------------------------------
learning:
  enabled: true
  replay_buffer_path: data/replay_buffer
  replay_buffer_max: 10000
  replay_buffer_ratio:
    fod: 0.6
    clean: 0.4
  confidence_weights:
    physical_pickup: 1.0
    visual_confirm: 0.7
    quick_dismiss: 0.3
  lora_rank: 16
  lora_alpha: 32
  fine_tune_epochs: 5
  fine_tune_batch_size: 16
  validation_map_drop_threshold: 0.02
  schedule: nightly

# ------------------------------------------------------------
# OUTPUTS
# ------------------------------------------------------------
outputs:
  detections_path: outputs/detections
  anomaly_frames_path: outputs/anomaly_frames
  gps_logs_path: outputs/gps_logs
  save_anomaly_frames: true
  save_gps_log: true
  overlay_bounding_boxes: true

# ------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------
logging:
  level: INFO
  log_path: logs/argus.log
  log_to_console: true

# ------------------------------------------------------------
# PATHWAY A — PatchCore (DINOv2)
# ------------------------------------------------------------
patchcore:
  bank_path: models/patchcore_bank.pt
  bank_max: 2000
  anomaly_threshold: 0.5
  dino_model: dinov2_vits14

# ------------------------------------------------------------
# PATHWAY B — CLIP Semantic Classifier
# ------------------------------------------------------------
clip:
  model: ViT-B/32
  fod_threshold: 0.5
  crop_size: 96

# ------------------------------------------------------------
# BUMP DETECTOR
# ------------------------------------------------------------
bump_detector:
  window: 30           # rolling frames
  k: 3.0               # sigma multiplier

# ------------------------------------------------------------
# PIPELINE
# ------------------------------------------------------------
pipeline:
  warmup_frames: 60
  bank_build_frames: 60
  max_cameras_parallel: 5
